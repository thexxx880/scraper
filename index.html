<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect</title>
<style>
body{
background:#0b0b0b;
font-family:Arial;
color:#fff;
padding:20px;
margin:0;
}
.box{
max-width:700px;
margin:auto;
background:#111;
padding:25px;
border-radius:14px;
box-shadow:0 0 20px rgba(255,215,0,.15);
}
textarea,input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:#fff;
}
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd700,#ffae00);
font-weight:bold;
cursor:pointer;
font-size:16px;
}
small{
color:#aaa;
}
#status { margin-top:10px; text-align:center; font-size:14px; min-height:24px; }
</style>
</head>
<body>
<div class="box">
    <h2>🔐 Panel Lz Protect</h2>
    <textarea id="url" rows="4" placeholder="Pega aquí tu enlace... https://ejemplo.com"></textarea>
    
    <button onclick="generar()">🚀 Generar URL Protegida (Anti-Ads)</button>
    
    <input id="resultado" readonly placeholder="Tu URL protegida aparecerá aquí">
    <div id="status"></div>
    
    <small>Ahora con 6 proxies + fallback automático.<br>
    Si sigue fallando, el sitio tiene protección fuerte (Cloudflare).</small>
</div>

<script>
// Lista de proxies actualizada 2026 (los más estables)
const proxies = [
    "https://api.allorigins.win/raw?url=",     // Muy estable
    "https://corsproxy.io/?",                  // Rápido
    "https://api.codetabs.com/v1/proxy?quest=", // Bueno contra bloqueos
    "https://cors.bridged.cc/",                // Cloudflare friendly
    "https://proxy.killcors.com/?url=",        // Nuevo y sin límites
    "https://thingproxy.freeboard.io/fetch/"   // Clásico
];

async function generar() {
    const urlInput = document.getElementById("url").value.trim();
    const status = document.getElementById("status");
    
    if (!urlInput) {
        alert("❌ Pega un enlace válido");
        return;
    }

    status.innerHTML = `<span style="color:#ffae00">🔄 Intentando con proxies...</span>`;
    document.getElementById("resultado").value = "";

    let html = null;
    let usedProxy = "";

    // Intentar cada proxy hasta que funcione
    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        const fullUrl = proxy + encodeURIComponent(urlInput);
        
        status.innerHTML = `<span style="color:#ffae00">🔄 Probando proxy ${i+1}/${proxies.length}...</span>`;

        try {
            const response = await fetch(fullUrl, { 
                headers: { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" }
            });

            if (response.ok) {
                html = await response.text();
                usedProxy = proxy;
                break; // ¡Éxito!
            } else if (response.status === 403 || response.status === 429) {
                console.log(`Proxy ${i+1} bloqueado (403/429)`);
            }
        } catch (e) {
            console.log(`Proxy ${i+1} falló`);
        }
    }

    if (!html) {
        status.innerHTML = `<span style="color:#ff4444">❌ Todos los proxies fallaron (403).<br>El sitio tiene protección anti-scraper fuerte.</span>`;
        return;
    }

    status.innerHTML = `<span style="color:#ffd700">✅ Usando ${usedProxy.split('/')[2]} → Limpiando...</span>`;

    // === LIMPIEZA AGRESIVA (igual que antes) ===
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    doc.querySelectorAll('script, noscript, iframe, embed, object, frame').forEach(el => el.remove());
    
    const adSelectors = ['[class*="ad"]','[id*="ad"]','.ads','.advert','.sponsor','.promoted','[onclick]','[onload]'];
    adSelectors.forEach(sel => {
        doc.querySelectorAll(sel).forEach(el => {
            if (el.tagName !== "BODY" && el.tagName !== "HTML") el.remove();
        });
    });

    doc.querySelectorAll('*').forEach(el => {
        Array.from(el.attributes).forEach(attr => {
            if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
        });
    });

    // Anti-popups dentro del HTML limpio
    const antiScript = doc.createElement('script');
    antiScript.textContent = `
        window.open = () => null;
        window.alert = window.confirm = window.prompt = () => null;
        document.addEventListener('click', e => { if(e.target.tagName==='A') e.preventDefault(); }, true);
        console.log('%c🛡️ Lz Protect Activado', 'color:#ffd700');
    `;
    doc.head.appendChild(antiScript);

    const cleanHTML = new XMLSerializer().serializeToString(doc);
    const base64 = btoa(unescape(encodeURIComponent(cleanHTML)));

    const finalUrl = location.origin + location.pathname.replace("index.html", "player.html") + "?v=" + base64;
    
    document.getElementById("resultado").value = finalUrl;
    status.innerHTML = `<span style="color:#00ff00">✅ ¡URL Protegida lista! (Proxy: ${usedProxy.split('/')[2]})</span>`;
}
</script>
</body>
</html>
