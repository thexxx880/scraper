<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect</title>
<style>
body{background:#0b0b0b;font-family:Arial;color:#fff;padding:20px;margin:0;}
.box{max-width:700px;margin:auto;background:#111;padding:25px;border-radius:14px;box-shadow:0 0 30px rgba(255,215,0,.3);border:1px solid #ffd700;}
textarea,input{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1c1c1c;color:#fff;font-size:16px;}
button{width:100%;padding:16px;margin-top:15px;border:none;border-radius:10px;background:linear-gradient(90deg,#ffd700,#ffae00);color:#000;font-weight:bold;cursor:pointer;font-size:18px;}
#resultado{margin-top:15px;padding:12px;background:#1c1c1c;border-radius:10px;word-break:break-all;font-size:14px;max-height:400px;overflow:auto;}
small{color:#aaa;display:block;margin-top:15px;text-align:center;}
#status{margin-top:10px;text-align:center;font-size:14px;}
</style>
</head>
<body>
<div class="box">
    <h2 style="text-align:center;margin-bottom:20px;">🔐 Panel Lz Protect</h2>
    <textarea id="url" rows="3" placeholder="Pega aquí tu enlace... https://argtesa.top/?v=xxx"></textarea>
    <button onclick="generar()">🚀 Generar Página Limpia (Anti-Ads + Anti-Popups)</button>
    <div id="resultado"></div>
    <div id="status"></div>
    <small>Ahora genera directamente una data: URL (sin límite de longitud)</small>
</div>

<script>
// Proxies más resistentes
const proxies = [
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url=",
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://thingproxy.freeboard.io/fetch/",
    "https://cors.bridged.cc/",
    "https://proxy.killcors.com/?url="
];

async function generar() {
    const urlInput = document.getElementById("url").value.trim();
    const status = document.getElementById("status");
    if (!urlInput) return alert("❌ Pega un enlace válido");

    status.innerHTML = `<span style="color:#ffae00">🔄 Intentando obtener la página...</span>`;
    document.getElementById("resultado").innerHTML = "";

    let html = null;
    for (let proxy of proxies) {
        try {
            const res = await fetch(proxy + encodeURIComponent(urlInput));
            if (res.ok) {
                html = await res.text();
                break;
            }
        } catch(e) {}
    }

    if (!html) {
        status.innerHTML = `<span style="color:red">❌ Cloudflare bloqueó todos los proxies.<br>Prueba con otro enlace o avísame.</span>`;
        return;
    }

    status.innerHTML = `<span style="color:#ffd700">🧹 Limpiando anuncios y pop-ups...</span>`;

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // Limpieza
    doc.querySelectorAll('script, noscript, iframe, embed, object, frame').forEach(el => el.remove());
    const ads = ['[class*="ad"]','[id*="ad"]','.ads','.advert','.sponsor','.promoted','.popup'];
    ads.forEach(sel => doc.querySelectorAll(sel).forEach(el => el.remove()));

    // Eliminar eventos peligrosos
    doc.querySelectorAll('*').forEach(el => {
        Array.from(el.attributes).forEach(attr => {
            if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
        });
    });

    // Anti-popups ultra fuerte dentro de la página
    const antiScript = doc.createElement('script');
    antiScript.textContent = `
        window.open = () => null;
        window.alert = window.confirm = window.prompt = () => null;
        Object.defineProperty(window, 'location', {set: () => {}});
        document.addEventListener('click', e => {
            if (e.target.tagName === 'A' || e.target.closest('a')) e.preventDefault();
        }, true);
        new MutationObserver(() => {
            document.querySelectorAll('[class*="ad"],[id*="ad"],.ads,.sponsor').forEach(el => el.remove());
        }).observe(document.body, {childList:true, subtree:true});
        console.log('%c🛡️ Lz Protect FULL ACTIVADO', 'color:#ffd700;font-size:12px');
    `;
    doc.head.appendChild(antiScript);

    const cleanHTML = new XMLSerializer().serializeToString(doc);
    const base64 = btoa(unescape(encodeURIComponent(cleanHTML)));
    const dataUrl = "data:text/html;base64," + base64;

    // Mostrar la URL limpia (data:)
    document.getElementById("resultado").innerHTML = `
        <strong>✅ Tu página limpia (sin ads ni pop-ups):</strong><br><br>
        <a href="${dataUrl}" target="_blank" style="color:#ffd700;word-break:break-all;">Abrir página limpia</a><br><br>
        <button onclick="navigator.clipboard.writeText('${dataUrl}');this.innerHTML='✅ Copiado!'" style="background:#222;color:#ffd700;padding:10px 20px;border-radius:8px;">📋 Copiar data: URL completa</button>
        <p style="font-size:12px;margin-top:10px;color:#aaa;">Pega esta URL en una nueva pestaña. Es 100% offline y bloquea pop-ups y anuncios.</p>
    `;

    status.innerHTML = `<span style="color:lime">✅ ¡Listo! Abre el enlace de arriba.</span>`;
}
</script>
</body>
</html>
