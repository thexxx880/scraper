<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect - VidHide</title>
<style>
body{background:#0b0b0b;font-family:Arial;color:#fff;padding:20px;margin:0;}
.box{max-width:700px;margin:auto;background:#111;padding:25px;border-radius:14px;box-shadow:0 0 30px rgba(255,215,0,.3);border:1px solid #ffd700;}
textarea,input{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1c1c1c;color:#fff;font-size:16px;}
button{width:100%;padding:16px;margin-top:15px;border:none;border-radius:10px;background:linear-gradient(90deg,#ffd700,#ffae00);color:#000;font-weight:bold;cursor:pointer;font-size:18px;}
#resultado{margin-top:15px;padding:12px;background:#1c1c1c;border-radius:10px;word-break:break-all;font-size:14px;max-height:400px;overflow:auto;}
small{color:#aaa;display:block;margin-top:15px;text-align:center;}
#status{margin-top:10px;text-align:center;font-size:14px;}
</style>
</head>
<body>
<div class="box">
    <h2 style="text-align:center;margin-bottom:20px;">🔐 Panel Lz Protect - VidHide</h2>
    <textarea id="url" rows="3" placeholder="Pega tu enlace de VidHide aquí"></textarea>
    <button onclick="generar()">🚀 Generar (Limpieza MÍNIMA)</button>
    <div id="resultado"></div>
    <div id="status"></div>
    <small>Versión ultra-ligera: solo pantalla completa</small>
</div>

<script>
const proxies = [
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url=",
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://thingproxy.freeboard.io/fetch/"
];

async function generar() {
    const urlInput = document.getElementById("url").value.trim();
    const status = document.getElementById("status");
    if (!urlInput) return alert("❌ Pega un enlace válido");

    status.innerHTML = `<span style="color:#ffae00">🔄 Cargando página...</span>`;
    document.getElementById("resultado").innerHTML = "";

    let html = null;
    for (let proxy of proxies) {
        try {
            const res = await fetch(proxy + encodeURIComponent(urlInput));
            if (res.ok) {
                html = await res.text();
                break;
            }
        } catch(e) {}
    }

    if (!html) {
        status.innerHTML = `<span style="color:red">❌ No se pudo cargar la página.</span>`;
        return;
    }

    status.innerHTML = `<span style="color:#ffd700">Ajustando a pantalla completa...</span>`;

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // LIMPIEZA EXTREMADAMENTE LIGERA (solo ads visibles)
    const ads = ['[class*="ad"]','[id*="ad"]','.ads','.advert','.sponsor','.promoted','.popup'];
    ads.forEach(sel => doc.querySelectorAll(sel).forEach(el => el.remove()));

    // Solo CSS de pantalla completa
    const fullCSS = doc.createElement('style');
    fullCSS.textContent = `
        html, body {margin:0!important;padding:0!important;height:100%!important;width:100%!important;overflow:hidden!important;background:#000!important;}
        video, iframe, .video, [class*="player"], [id*="player"], #vplayer {width:100vw!important;height:100vh!important;object-fit:contain!important;background:#000!important;}
    `;
    doc.head.appendChild(fullCSS);

    // Anti-popups mínimo posible
    const anti = doc.createElement('script');
    anti.textContent = `window.open=function(){return null;};`;
    doc.head.appendChild(anti);

    const cleanHTML = new XMLSerializer().serializeToString(doc);
    const base64 = btoa(unescape(encodeURIComponent(cleanHTML)));
    const dataUrl = "data:text/html;base64," + base64;

    document.getElementById("resultado").innerHTML = `
        <strong>✅ Enlace VidHide listo:</strong><br><br>
        <a href="${dataUrl}" target="_blank" style="color:#ffd700;word-break:break-all;">Abrir en Pantalla Completa</a><br><br>
        <button onclick="navigator.clipboard.writeText('${dataUrl}');this.innerHTML='✅ Copiado!'" style="background:#222;color:#ffd700;padding:10px 20px;border-radius:8px;">📋 Copiar URL</button>
    `;

    status.innerHTML = `<span style="color:lime">✅ Listo. Abre el enlace.</span>`;
}
</script>
</body>
</html>
