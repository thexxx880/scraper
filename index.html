<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect</title>
<style>
body{
background:#0b0b0b;
font-family:Arial;
color:#fff;
padding:20px;
margin:0;
}
.box{
max-width:700px;
margin:auto;
background:#111;
padding:25px;
border-radius:14px;
box-shadow:0 0 20px rgba(255,215,0,.15);
}
textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:#fff;
}
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd700,#ffae00);
font-weight:bold;
cursor:pointer;
font-size:16px;
}
small{
color:#aaa;
}
#status { margin-top:10px; text-align:center; font-size:14px; }
</style>
</head>
<body>
<div class="box">
    <h2>🔐 Panel Lz Protect</h2>
    <textarea id="url" rows="4" placeholder="Pega aquí tu enlace... https://ejemplo.com"></textarea>
    
    <select id="proxy" style="width:100%; margin-top:10px; padding:12px; background:#1c1c1c; color:#fff; border:none; border-radius:10px;">
        <option value="https://corsproxy.io/?">corsproxy.io (recomendado)</option>
        <option value="https://api.allorigins.win/raw?url=">allorigins.win</option>
    </select>
    
    <button onclick="generar()">🚀 Generar URL Protegida (Anti-Ads)</button>
    
    <input id="resultado" readonly placeholder="Tu URL protegida aparecerá aquí">
    <div id="status"></div>
    
    <small>HTML limpio + Base64 + Bloqueo total de pop-ups, ads y trackers.<br>
    Usa tu player.html en GitHub Pages o cualquier hosting.</small>
</div>

<script>
// Selectores de anuncios y elementos peligrosos
const adSelectors = [
    '[class*="ad"]', '[id*="ad"]', '.ads', '.advert', '.sponsor', '.promoted',
    'iframe', 'embed', 'object', 'script', 'noscript', '[onclick]', '[onload]'
];

async function generar() {
    const urlInput = document.getElementById("url").value.trim();
    const proxy = document.getElementById("proxy").value;
    const status = document.getElementById("status");
    
    if (!urlInput) {
        alert("❌ Pega un enlace válido");
        return;
    }

    status.innerHTML = `<span style="color:#ffae00">⏳ Obteniendo y limpiando la página...</span>`;

    const proxyUrl = proxy + encodeURIComponent(urlInput);

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error("No se pudo obtener la página");

        let html = await response.text();

        // Parsear y limpiar
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        // Eliminar scripts, iframes, ads...
        doc.querySelectorAll('script, noscript, iframe, embed, object').forEach(el => el.remove());
        
        adSelectors.forEach(sel => {
            doc.querySelectorAll(sel).forEach(el => {
                if (el.tagName !== "BODY" && el.tagName !== "HTML") el.remove();
            });
        });

        // Eliminar atributos de eventos (onclick, onload, etc.)
        doc.querySelectorAll('*').forEach(el => {
            Array.from(el.attributes).forEach(attr => {
                if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
            });
        });

        // Inyectar protección anti-popups dentro del HTML limpio
        const antiScript = doc.createElement('script');
        antiScript.textContent = `
            window.open = () => null;
            window.alert = window.confirm = window.prompt = () => null;
            document.addEventListener('click', e => {
                if (e.target.tagName === 'A') e.preventDefault();
            }, true);
            console.log('%c🛡️ Lz Protect Activado - Sin ads ni pop-ups', 'color:#ffd700');
        `;
        doc.head.appendChild(antiScript);

        // Convertir a Base64
        const cleanHTML = new XMLSerializer().serializeToString(doc);
        const base64 = btoa(unescape(encodeURIComponent(cleanHTML)));

        // Generar URL final
        const finalUrl = location.origin + location.pathname.replace("index.html", "player.html") + "?v=" + base64;
        
        document.getElementById("resultado").value = finalUrl;
        status.innerHTML = `<span style="color:#ffd700">✅ ¡URL Protegida generada! Copia y usa en player.html</span>`;

    } catch (e) {
        console.error(e);
        status.innerHTML = `<span style="color:#ff4444">❌ Error: ${e.message}. Prueba otro proxy.</span>`;
    }
}
</script>
</body>
</html>
