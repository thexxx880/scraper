<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect</title>

<style>
body{
background:#0b0b0b;
font-family:Arial;
color:#fff;
padding:20px;
margin:0;
}

.box{
max-width:700px;
margin:auto;
background:#111;
padding:20px;
border-radius:14px;
box-shadow:0 0 20px rgba(255,215,0,.15);
}

textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:#fff;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd700,#ffae00);
font-weight:bold;
cursor:pointer;
}

small{
color:#aaa;
}
</style>
</head>
<body>

<div class="box">
<h2>🔐 Panel Protector</h2>

<textarea id="url" rows="5" placeholder="Pega aquí tu enlace..."></textarea>

<button onclick="generar()">Generar URL Protegida</button>

<input id="resultado" readonly>

<small>Usa tu player.html en GitHub Pages o hosting.</small>
</div>

<script>
function generar(){
let url = document.getElementById("url").value.trim();

if(!url){
alert("Pega un enlace");
return;
}

let b64 = btoa(unescape(encodeURIComponent(url)));

let final = location.origin + location.pathname.replace("panel.html","player.html") + "?v=" + b64;

document.getElementById("resultado").value = final;
}
</script>

</body>
</html>
