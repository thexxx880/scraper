<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect </title>
<style>
body{background:#0b0b0b;font-family:Arial;color:#fff;padding:20px;margin:0;}
.box{max-width:700px;margin:auto;background:#111;padding:25px;border-radius:14px;box-shadow:0 0 30px rgba(255,215,0,.3);border:1px solid #ffd700;}
textarea,input{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1c1c1c;color:#fff;font-size:16px;}
button{width:100%;padding:16px;margin-top:15px;border:none;border-radius:10px;background:linear-gradient(90deg,#ffd700,#ffae00);color:#000;font-weight:bold;cursor:pointer;font-size:18px;}
#resultado{margin-top:15px;padding:12px;background:#1c1c1c;border-radius:10px;word-break:break-all;font-size:14px;max-height:400px;overflow:auto;}
small{color:#aaa;display:block;margin-top:15px;text-align:center;}
#status{margin-top:10px;text-align:center;font-size:14px;}
</style>
</head>
<body>
<div class="box">
    <h2 style="text-align:center;margin-bottom:20px;">🔐 Panel Lz Protect + Plyr Player</h2>
    <textarea id="url" rows="3" placeholder="Pega aquí tu enlace... https://argtesa.top/?v=xxx"></textarea>
    <button onclick="generar()">🚀 Generar con Plyr (Adelantar/Retroceder 10s)</button>
    <div id="resultado"></div>
    <div id="status"></div>
    <small>Controles profesionales + flechas ← → del teclado para ±10 segundos</small>
</div>

<script>
// Proxies
const proxies = [
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url=",
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://thingproxy.freeboard.io/fetch/",
    "https://cors.bridged.cc/",
    "https://proxy.killcors.com/?url="
];

async function generar() {
    const urlInput = document.getElementById("url").value.trim();
    const status = document.getElementById("status");
    if (!urlInput) return alert("❌ Pega un enlace válido");

    status.innerHTML = `<span style="color:#ffae00">🔄 Obteniendo página...</span>`;
    document.getElementById("resultado").innerHTML = "";

    let html = null;
    for (let proxy of proxies) {
        try {
            const res = await fetch(proxy + encodeURIComponent(urlInput));
            if (res.ok) {
                html = await res.text();
                break;
            }
        } catch(e) {}
    }

    if (!html) {
        status.innerHTML = `<span style="color:red">❌ Cloudflare bloqueó todos los proxies.</span>`;
        return;
    }

    status.innerHTML = `<span style="color:#ffd700">🧹 Limpiando + añadiendo Plyr...</span>`;

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // Limpieza suave
    doc.querySelectorAll('noscript, iframe, embed, object, frame').forEach(el => el.remove());
    const ads = ['[class*="ad"]','[id*="ad"]','.ads','.advert','.sponsor','.promoted','.popup'];
    ads.forEach(sel => doc.querySelectorAll(sel).forEach(el => el.remove()));

    // Eliminar eventos peligrosos
    doc.querySelectorAll('*').forEach(el => {
        Array.from(el.attributes).forEach(attr => {
            if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
        });
    });

    // === INYECTAR PLYR (corregido y simplificado) ===
    const plyrCSS = doc.createElement('link');
    plyrCSS.rel = 'stylesheet';
    plyrCSS.href = 'https://cdn.plyr.io/3.7.8/plyr.css';
    doc.head.appendChild(plyrCSS);

    const plyrJS = doc.createElement('script');
    plyrJS.src = 'https://cdn.plyr.io/3.7.8/plyr.polyfilled.js';
    doc.body.appendChild(plyrJS);

    // Script de inicialización (muy simplificado para evitar errores de sintaxis)
    const initScript = doc.createElement('script');
    initScript.textContent = `
        function initPlyr() {
            var videos = document.querySelectorAll('video');
            if (videos.length > 0) {
                videos.forEach(function(video) {
                    var player = new Plyr(video, {
                        controls: ['play-large','play','progress','current-time','duration','mute','volume','settings','pip','fullscreen'],
                        settings: ['speed'],
                        speed: {selected:1, options:[0.5,0.75,1,1.25,1.5,2]}
                    });

                    // Atajos teclado +10s / -10s
                    document.addEventListener('keydown', function(e) {
                        if (e.key === "ArrowRight") player.currentTime += 10;
                        if (e.key === "ArrowLeft")  player.currentTime -= 10;
                    });
                });
                console.log('%c🎥 Plyr Player cargado correctamente', 'color:#ffd700');
            }
        }
        // Esperar a que Plyr se cargue
        var checkPlyr = setInterval(function() {
            if (typeof Plyr !== 'undefined') {
                clearInterval(checkPlyr);
                initPlyr();
            }
        }, 300);
    `;
    doc.body.appendChild(initScript);

    // Anti-popups
    const anti = doc.createElement('script');
    anti.textContent = `window.open=()=>null;window.alert=window.confirm=window.prompt=()=>null;document.addEventListener('click',function(e){if(e.target.tagName==='A')e.preventDefault();},true);`;
    doc.head.appendChild(anti);

    const cleanHTML = new XMLSerializer().serializeToString(doc);
    const base64 = btoa(unescape(encodeURIComponent(cleanHTML)));
    const dataUrl = "data:text/html;base64," + base64;

    document.getElementById("resultado").innerHTML = `
        <strong>✅ Video con Plyr listo:</strong><br><br>
        <a href="${dataUrl}" target="_blank" style="color:#ffd700">▶ Abrir con Plyr Player</a><br><br>
        <button onclick="navigator.clipboard.writeText('${dataUrl}');this.innerHTML='✅ Copiado!'" style="background:#222;color:#ffd700;padding:10px 20px;border-radius:8px;">📋 Copiar URL</button>
        <p style="font-size:12px;color:#aaa;margin-top:8px;">Usa las flechas del teclado ← → para adelantar o retroceder 10 segundos</p>
    `;

    status.innerHTML = `<span style="color:lime">✅ ¡Listo! Si no ves el player, desactiva el adblocker temporalmente en esta pestaña.</span>`;
}
</script>
</body>
</html>
