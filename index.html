<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Lz Protect</title>
<style>
body{
background:#0b0b0b;
font-family:Arial;
color:#fff;
padding:20px;
margin:0;
}
.box{
max-width:700px;
margin:auto;
background:#111;
padding:25px;
border-radius:14px;
box-shadow:0 0 30px rgba(255,215,0,.3);
border:1px solid #ffd700;
}
textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:#fff;
font-size:16px;
}
button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd700,#ffae00);
color:#000;
font-weight:bold;
cursor:pointer;
font-size:18px;
box-shadow:0 4px 15px rgba(255,215,0,.4);
}
button:hover{
transform:scale(1.03);
}
#resultado{
margin-top:10px;
font-size:15px;
padding:12px;
background:#1c1c1c;
border-radius:10px;
word-break:break-all;
}
small{
color:#aaa;
display:block;
margin-top:15px;
text-align:center;
}
</style>
</head>
<body>
<div class="box">
    <h2 style="text-align:center;margin-bottom:20px;">🔐 Panel Lz Protect</h2>
    
    <textarea id="url" rows="3" placeholder="Pega aquí tu enlace... https://argtesa.top/?v=xxx"></textarea>
    
    <button onclick="generar()">🚀 Generar URL Protegida</button>
    
    <div id="resultado" style="display:none;"></div>
    
    <small>El enlace se cargará dentro de player.html con sandbox (anti-popups y ads)</small>
</div>

<script>
function generar() {
    let url = document.getElementById("url").value.trim();
    if (!url) {
        alert("❌ Pega un enlace válido");
        return;
    }

    // Codificamos la URL para que pueda ir por GET
    let encoded = encodeURIComponent(url);
    
    // Genera la URL que pasa por player.html
    let finalUrl = location.origin + location.pathname.replace(/[^/]*$/, "player.html") + "?url=" + encoded;

    let res = document.getElementById("resultado");
    res.style.display = "block";
    res.innerHTML = `
        <strong>✅ Tu URL Protegida:</strong><br>
        <a href="${finalUrl}" target="_blank" style="color:#ffd700; text-decoration:underline;">${finalUrl}</a><br><br>
        <button onclick="copiar('${finalUrl}')" style="background:#222; color:#ffd700; width:auto; padding:8px 20px; font-size:14px;">📋 Copiar URL</button>
    `;
}

function copiar(texto) {
    navigator.clipboard.writeText(texto).then(() => {
        alert("✅ URL copiada al portapapeles");
    });
}
</script>
</body>
</html>
