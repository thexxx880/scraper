<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lz Protect Player</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;}
iframe{width:100%;height:100%;border:none;}
</style>
</head>
<body>
<iframe id="frame" allowfullscreen></iframe>

<script>
const code = new URLSearchParams(location.search).get("v");
if (code) {
    document.getElementById("frame").src = "data:text/html;base64," + code;
} else {
    document.body.innerHTML = `<h2 style="color:white;text-align:center;padding-top:80px">❌ Error</h2>`;
}
</script>
</body>
</html>
