<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lz Protect Player</title>
<style>
html,body{
margin:0;
height:100%;
background:#000;
overflow:hidden;
}
iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>
<body>
<iframe id="frame"
        sandbox="allow-scripts allow-forms allow-presentation"
        referrerpolicy="no-referrer"
        allowfullscreen>
</iframe>

<script>
function getParam(name) {
    return new URLSearchParams(location.search).get(name);
}

try {
    const code = getParam("v");
    if (code) {
        const dataUrl = "data:text/html;base64," + code;
        document.getElementById("frame").src = dataUrl;
    } else {
        document.body.innerHTML = `<h2 style="color:white;text-align:center;padding-top:40px">❌ No se recibió código</h2>`;
    }
} catch (e) {
    document.body.innerHTML = `<h2 style="color:white;text-align:center;padding-top:40px">❌ Error al decodificar</h2>`;
}

// Protecciones extras
window.open = function() { return null; };
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
